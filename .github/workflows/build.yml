name: Create Multi-Platform Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            artifact_name: launiator.exe
            asset_name: launiator-windows.exe
          - os: ubuntu-latest
            artifact_name: launiator
            asset_name: launiator-linux
          - os: macos-latest
            artifact_name: launiator
            asset_name: launiator-macos

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller
      shell: bash
      run: |
        if [ "${{ matrix.os }}" == "windows-latest" ]; then
          pyinstaller --onefile --noconsole --add-data "theme.wav;." --hidden-import PIL._tkinter_finder --name launiator-windows launiator.py
        elif [ "${{ matrix.os }}" == "macos-latest" ]; then
          pyinstaller --onefile --noconsole --add-data "theme.wav:." --hidden-import PIL._tkinter_finder --name launiator-macos launiator.py
        else
          pyinstaller --onefile --noconsole --add-data "theme.wav:." --hidden-import PIL._tkinter_finder --name launiator-linux launiator.py
        fi

    - name: Rename Artifact
      shell: bash
      run: |
        mv dist/${{ matrix.artifact_name }} dist/${{ matrix.asset_name }}

    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: dist/${{ matrix.asset_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
